<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple static website with hot reloading via Vite." />
    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Modern Static Website</title>
  </head>
  <body>
    <div id="app">
      <div class="glass-card">
        <h1>Vite Static Site</h1>
        <p>Lightning fast development with modern web aesthetics.</p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
          <button class="btn" id="action-btn">Click to interact</button>
          <a href="/about.html" class="btn" style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);">About</a>
        </div>
        <div class="features">
          <span class="badge">Hot Reloading</span>
          <span class="badge">GitHub Pages Ready</span>
          <span class="badge">Glassmorphism</span>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
